<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="112" height="112" rx="24" ry="24" fill="url(#iconGrad)" filter="url(#glow)"/>

  <!-- F shape -->
  <rect x="28" y="25" width="60" height="11" rx="5.5" fill="white" opacity="0.95"/>
  <rect x="28" y="25" width="11" height="70" rx="5.5" fill="white" opacity="0.95"/>
  <rect x="28" y="56" width="45" height="10" rx="5" fill="white" opacity="0.85"/>

  <!-- Arrow up (profit/flip) -->
  <polyline points="64,83 78,65 92,83" fill="none" stroke="white" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <line x1="78" y1="65" x2="78" y2="95" stroke="white" stroke-width="7.5" stroke-linecap="round" opacity="0.9"/>
</svg>
