{% extends "base.html" %}
{% block title %}Set New Password — FlipAFind{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="font-heading font-extrabold text-3xl text-gradient mb-2">New Password</h1>
      <p class="text-[#52526a]">Choose a strong password for your account</p>
    </div>
    <div class="card p-8">
      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-[#f1f5f9]/70 mb-1.5">New Password</label>
            <input type="password" name="password" required placeholder="At least 8 characters"
              class="input-field w-full" autocomplete="new-password">
          </div>
          <div>
            <label class="block text-sm font-medium text-[#f1f5f9]/70 mb-1.5">Confirm Password</label>
            <input type="password" name="confirm_password" required placeholder="Repeat your password"
              class="input-field w-full" autocomplete="new-password">
          </div>
          <button type="submit" class="btn-primary w-full py-3 text-base mt-2">
            Set New Password
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
