{% extends "base.html" %}
{% block title %}Page Not Found — FlipAFind{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="text-center">
    <div class="font-heading font-extrabold text-8xl text-gradient mb-4">404</div>
    <h1 class="font-heading font-bold text-2xl text-[#f1f5f9] mb-3">Page not found</h1>
    <p class="text-[#52526a] mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <div class="flex gap-3 justify-center">
      <a href="{{ url_for('auth.landing') }}" class="btn-primary px-6 py-2.5">Go Home</a>
      <a href="{{ url_for('dashboard.home') }}" class="btn-outline px-6 py-2.5">Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
